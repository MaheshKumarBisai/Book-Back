version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: bookworm-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru

  backend:
    build: .
    container_name: bookworm-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  redis_data:
